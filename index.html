<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Little Surprise! ✨</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: #4a5568; }

        .container { width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(255, 154, 162, 0.3); text-align: center; z-index: 10; }

        #run-btn { position: absolute; padding: 12px 28px; font-size: 16px; font-weight: bold; background: linear-gradient(45deg, #ff477e, #ff7096); color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 100; transition: transform 0.1s; }

        .gift-box { font-size: 80px; cursor: pointer; transition: transform 0.3s; display: inline-block; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }

        /* Bubble Message for Wrong Clicks */
        #wrong-click-bubble {
            position: absolute;
            top: 20%;
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #ff477e;
            color: #ff477e;
            font-weight: bold;
            display: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="wrong-click-bubble">
        (◕‿◕✿) Oops! Aim for the gift! 🎁
    </div>

    <div class="container" id="stage1">
        <h1 id="welcome-msg">Hello Gorgeous! 🥰</h1>
        <p>Catch the button if you can!</p>
        <div style="height: 100px; position: relative; width: 100%; margin-top: 20px;">
            <button id="run-btn" onmouseover="flyAway()" onclick="nextStage()">Click Me! 👈</button>
        </div>
    </div>

    <div class="container" id="stage2" style="display: none;">
        <h1 id="stage2-title">Opening...</h1>
        <div id="box-container"><div class="gift-box" onclick="openBox()">🎁</div></div>
        <p id="box-level">1 of 3</p>
    </div>

    <div class="container" id="final-stage" style="display: none;">
        <div class="final-card">
            <h1 style="font-size: 26px;">Happy Girl's Day! ✨</h1>
            <p id="final-msg">You make the world beautiful!</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Welcome message
        const user = tg.initDataUnsafe?.user;
        if (user && user.first_name) {
            document.getElementById('welcome-msg').innerText = `Hello ${user.first_name}! 🥰`;
            document.getElementById('final-msg').innerText = `${user.first_name}, you make the world beautiful! Happy Girl's Day! ❤️`;
        }

        // Wrong click logic
        document.body.addEventListener('click', function(e) {
            // If click is not on the button AND not on the gift box, show bubble
            if (!e.target.closest('#run-btn') && !e.target.closest('.gift-box')) {
                showBubble();
            }
        });

        function showBubble() {
            const bubble = document.getElementById('wrong-click-bubble');
            bubble.style.display = 'block';
            setTimeout(() => bubble.style.display = 'none', 1500);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // Runaway Button
        function flyAway() {
            const x = Math.random() * 160 - 80;
            const y = Math.random() * 60 - 30;
            document.getElementById('run-btn').style.transform = `translate(${x}px, ${y}px)`;
        }

        function nextStage() {
            document.getElementById('stage1').style.display = 'none';
            document.getElementById('stage2').style.display = 'flex';
        }

        // Fixed Box Logic
        let boxLevel = 1;
        const icons = ["🎁", "📦", "✉️"];

        function openBox() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            boxLevel++;
            
            if (boxLevel <= 3) {
                // Update UI for next box
                document.getElementById('box-container').innerHTML = `<div class="gift-box" onclick="openBox()" style="transform: scale(${1 - (boxLevel*0.1)})">${icons[boxLevel-1]}</div>`;
                document.getElementById('box-level').innerText = `${boxLevel} of 3`;
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('stage2').style.display = 'none';
            document.getElementById('final-stage').style.display = 'block';
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
